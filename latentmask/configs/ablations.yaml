# Ablation configurations (Table 3)
#
# Each variant name maps to a trainer class in latentmask/trainer/latentmask_trainer.py

ablations:
  A1_UniformPU:
    trainer: LatentMaskTrainer_A1_UniformPU
    description: "PU correction with uniform propensity e=0.5"
    propnet: false
    pu_correction: true
    smoothness: false
    teacher_refine: false

  A2_PropNetOnly:
    trainer: LatentMaskTrainer_A2_PropNetOnly
    description: "PU correction + learned PropNet, no smoothness or refinement"
    propnet: true
    pu_correction: true
    smoothness: false
    teacher_refine: false

  A3_NoRefine:
    trainer: LatentMaskTrainer_A3_NoRefine
    description: "PU + PropNet + smoothness, no teacher refinement"
    propnet: true
    pu_correction: true
    smoothness: true
    teacher_refine: false

  A4_Full:
    trainer: LatentMaskTrainer
    description: "Full LatentMask (PU + PropNet + smoothness + teacher refinement)"
    propnet: true
    pu_correction: true
    smoothness: true
    teacher_refine: true

baselines:
  nnUNet_pixel_only:
    trainer: nnUNetTrainer
    description: "Standard nnUNet trained on pixel-only data"

  MixedNaive:
    trainer: MixedNaiveTrainer
    description: "Naive tri-granularity without PU correction"

  nnPU_Seg:
    trainer: nnPUSegTrainer
    description: "Standard PU learning adapted to 3D seg (no PropNet)"

  MeanTeacher:
    trainer: MeanTeacher3DTrainer
    description: "Mean Teacher semi-supervised with EMA pseudo-labels"

  CPS:
    trainer: CPSTrainer
    description: "Cross Pseudo Supervision with dual networks"

  BoxSup:
    trainer: BoxSup3DTrainer
    description: "3D BoxSup with bounding box supervision"
